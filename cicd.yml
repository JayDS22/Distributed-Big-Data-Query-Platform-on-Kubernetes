name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  GO_VERSION: 1.21
  PYTHON_VERSION: "3.11"

jobs:
  # Build and test Go CLI
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Run Go linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m
      
      - name: Run Go tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
      
      - name: Build Go binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/dbqp-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/dbqp-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -o dist/dbqp-windows-amd64.exe .
      
      - name: Upload Go artifacts
        uses: actions/upload-artifact@v3
        with:
          name: go-binaries
          path: dist/

  # Build and push Docker images
  build-docker:
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v2
      
      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Test Python benchmarking suite
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install pytest pytest-cov flake8
      
      - name: Run linting
        run: flake8 python/ --max-line-length=120
      
      - name: Run Python tests
        run: pytest python/ -v --cov=python --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: python
          name: python-coverage

  # Integration tests with Kubernetes
  integration-tests:
    needs: [build-go, build-docker]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - uses: helm/kind-action@v1.7.0
        with:
          cluster_name: dbqp-test
          config: |
            kind: Cluster
            apiVersion: kind.x-k8s.io/v1alpha4
            nodes:
            - role: control-plane
            - role: worker
            - role: worker
      
      - name: Download Go binaries
        uses: actions/download-artifact@v3
        with:
          name: go-binaries
          path: dist/
      
      - name: Setup cluster
        run: |
          chmod +x scripts/setup-cluster.sh
          ./scripts/setup-cluster.sh kind dbqp-test
      
      - name: Run health checks
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh dbqp-test
      
      - name: Deploy test cluster
        run: |
          chmod +x dist/dbqp-linux-amd64
          ./dist/dbqp-linux-amd64 create --engine trino --workers 2 --namespace dbqp-test
      
      - name: Wait for cluster readiness
        run: |
          kubectl wait --for=condition=Ready pod -l app=trino --timeout=5m -n dbqp-test || true
          sleep 30
      
      - name: Verify cluster status
        run: |
          ./dist/dbqp-linux-amd64 status trino-* --namespace dbqp-test || true
      
      - name: Collect logs
        if: always()
        run: |
          chmod +x scripts/collect-logs.sh
          ./scripts/collect-logs.sh dbqp-test || true
      
      - name: Cleanup
        if: always()
        run: |
          chmod +x scripts/cleanup.sh
          ./scripts/cleanup.sh dbqp-test --force || true

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif
      
      - name: Run GoSec security scanner
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt sarif -out gosec-results.sarif ./...
      
      - name: Upload GoSec results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: gosec-results.sarif

  # Build and push Helm chart
  helm-chart:
    needs: build-docker
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: azure/setup-helm@v3
        with:
          version: latest
      
      - name: Lint Helm charts
        run: |
          helm lint k8s/helm/trino
          helm lint k8s/helm/spark
      
      - name: Package Helm charts
        run: |
          mkdir -p helm-packages
          helm package k8s/helm/trino -d helm-packages
          helm package k8s/helm/spark -d helm-packages
      
      - name: Upload Helm charts
        uses: actions/upload-artifact@v3
        with:
          name: helm-charts
          path: helm-packages/

  # Final status check
  status:
    needs: [build-go, build-docker, test-python, integration-tests, security-scan, helm-chart]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-go.result }}" != "success" ] || \
             [ "${{ needs.build-docker.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed"
      
      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Go builds: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Python tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Security scan: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Helm charts: ✅" >> $GITHUB_STEP_SUMMARY
